services:
  db:
    image: postgres:16.10
    environment:
      POSTGRES_DB: project_sgei_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6381:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    environment:
      DATABASE_HOST: db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: password
      RAILS_ENV: development
      REDIS_URL: redis://redis:6379/0
      # Imagem de produção define BUNDLE_WITHOUT=development; em dev precisamos das gems desse grupo.
      BUNDLE_WITHOUT: ""
      # Permite sincronizar o volume bundle_cache com o Gemfile.lock após alterações.
      BUNDLE_DEPLOYMENT: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    entrypoint: [ "bash", "/rails/bin/docker-compose-web" ]

  # Jobs em background: este projeto usa Solid Queue (gem solid_queue), não Sidekiq.
  # Para processar filas em dev: SOLID_QUEUE_IN_PUMA=1 no web ou `bin/jobs` conforme config/queue.yml.

  test:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    environment:
      RAILS_ENV: test
      DATABASE_HOST: db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: password
      DATABASE_URL: postgres://postgres:password@db:5432/social_midia_test
      BUNDLE_WITHOUT: ""
      BUNDLE_DEPLOYMENT: "false"
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "bash",
        "-lc",
        "cd /rails && bundle config unset without 2>/dev/null || true; bundle config unset deployment 2>/dev/null || true; bundle install --jobs 4 --retry 3 && bundle exec rspec",
      ]

volumes:
  postgres_data:
  redis_data:
  bundle_cache:
